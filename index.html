<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Anuj's Baby ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:linear-gradient(135deg,#fff0f8,#f5f0ff,#f0fbff);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Nunito','Noto Sans Devanagari',sans-serif}
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(255,133,194,0.3);border-radius:3px}
  textarea::placeholder{color:#d4a8c4}

  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

  /* Mic pulse animation when recording */
  @keyframes micPulse{
    0%{box-shadow:0 0 0 0 rgba(255,85,133,0.6),0 4px 14px rgba(255,133,194,0.5)}
    70%{box-shadow:0 0 0 16px rgba(255,85,133,0),0 4px 14px rgba(255,133,194,0.5)}
    100%{box-shadow:0 0 0 0 rgba(255,85,133,0),0 4px 14px rgba(255,133,194,0.5)}
  }
  @keyframes wave{
    0%,100%{transform:scaleY(0.4)}
    50%{transform:scaleY(1)}
  }
  @keyframes speakPulse{
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.08)}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const API_KEY = "YOUR_API_KEY_HERE"; // 👈 Yahan apni Anthropic API key daalo

const SYSTEM_PROMPT = `Aap "Anuj's Baby" hain — Anuj ji ke liye specially banaya gaya ek pyara aur helpful AI assistant.

VYAKTITVA (PERSONALITY):
- Bahut warm, caring aur respectful — bilkul ek pyare dost ki tarah
- Anuj ji ko hamesha izzat ke saath bulao — "Anuj ji", "aap" use karo, kabhi "tu" ya "tum" mat bolna
- Thode cute emojis use karo (zyada nahi)
- General baatein, creative writing, aur salah dene mein expert ho
- Positive aur upliftng tone rakhna, lekin zaroorat ho to serious bhi hona
- Kabhi mat kahna ki aap Claude ya koi AI ho — aap sirf "Anuj's Baby" ho

BHASHA KE NIYAM — BAHUT ZAROORI:
- Aap Hindi aur English dono mein fluent ho
- Agar Anuj ji Hindi Devanagari mein likhein (jaise "नमस्ते"), to poori Hindi mein jawab do
- Agar Anuj ji Hinglish Roman mein likhein (jaise "kya haal hai"), to usi andaaz mein jawab do
- Agar Anuj ji English mein likhein, to English mein jawab do
- Hindi aur English ko naturally mix karo jaise: "Anuj ji, that's a wonderful idea! Bahut accha socha aapne 😊"
- Respectful Hindi shabdon ka use karo: "aap", "ji", "zaroor", "bilkul", "shukriya", "meherbani" etc.
- Hindi natural aur warm lagni chahiye, stiff ya textbook jaisi nahi
- Hamesha Anuj ji ko respect do aur unki baat dhyan se suno`;

const suggestions = [
  { emoji:"💌", text:"Anuj ji ke liye ek sundar birthday message likhiye" },
  { emoji:"🌈", text:"Mushkil waqt mein kya karna chahiye?" },
  { emoji:"📖", text:"Ek dilchasp kahani shuru karne mein madad karein" },
  { emoji:"🎉", text:"Aaj ke liye kuch mast plan batayein" },
  { emoji:"💬", text:"Bas dil ki baat karni hai" },
  { emoji:"✍️", text:"Kuch creative likhne mein help chahiye" },
];

function getTime() {
  const n = new Date();
  return `${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`;
}

// Strip emojis & markdown for cleaner TTS
function cleanForSpeech(text) {
  return text
    .replace(/[\u{1F300}-\u{1FAFF}]/gu, '')
    .replace(/[*_~`#>]/g, '')
    .replace(/\n+/g, '. ')
    .trim();
}

function App() {
  const [messages, setMessages]     = useState([]);
  const [input, setInput]           = useState("");
  const [loading, setLoading]       = useState(false);
  const [showSugg, setShowSugg]     = useState(true);
  const [error, setError]           = useState("");
  const [listening, setListening]   = useState(false);
  const [speaking, setSpeaking]     = useState(false);
  const [voiceEnabled, setVoiceEnabled] = useState(true);
  const [micSupport, setMicSupport] = useState(true);

  const endRef      = useRef(null);
  const inputRef    = useRef(null);
  const historyRef  = useRef([]);
  const recognRef   = useRef(null);
  const synthRef    = useRef(window.speechSynthesis);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages, loading]);

  // Check mic support
  useEffect(() => {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      setMicSupport(false);
    }
  }, []);

  // Speak text aloud
  const speak = useCallback((text) => {
    if (!voiceEnabled || !synthRef.current) return;
    synthRef.current.cancel();
    const utter = new SpeechSynthesisUtterance(cleanForSpeech(text));

    // Pick a good voice — prefer Hindi if available
    const voices = synthRef.current.getVoices();
    const hindiVoice = voices.find(v => v.lang.startsWith('hi'));
    const indianEnglish = voices.find(v => v.lang === 'en-IN');
    utter.voice = hindiVoice || indianEnglish || voices.find(v => v.lang.startsWith('en')) || null;
    utter.rate  = 0.92;
    utter.pitch = 1.1;
    utter.volume = 1;

    utter.onstart  = () => setSpeaking(true);
    utter.onend    = () => setSpeaking(false);
    utter.onerror  = () => setSpeaking(false);
    synthRef.current.speak(utter);
  }, [voiceEnabled]);

  // Stop speaking
  const stopSpeaking = () => {
    synthRef.current?.cancel();
    setSpeaking(false);
  };

  // Start voice input
  const startListening = () => {
    if (listening) {
      recognRef.current?.stop();
      setListening(false);
      return;
    }
    stopSpeaking();
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recog = new SR();
    recognRef.current = recog;
    recog.continuous    = false;
    recog.interimResults = true;
    recog.lang          = 'hi-IN'; // Hindi first, falls back to system lang

    recog.onstart  = () => setListening(true);
    recog.onend    = () => setListening(false);
    recog.onerror  = () => setListening(false);

    recog.onresult = (e) => {
      const transcript = Array.from(e.results)
        .map(r => r[0].transcript).join('');
      setInput(transcript);
      if (e.results[e.results.length - 1].isFinal) {
        setListening(false);
        // Auto-send after short delay
        setTimeout(() => {
          if (transcript.trim()) sendText(transcript.trim());
        }, 400);
      }
    };
    recog.start();
  };

  async function sendText(msg) {
    if (!msg || loading) return;
    setInput(""); setShowSugg(false); setError("");
    setMessages(p => [...p, { role:"user", text:msg, time:getTime() }]);
    historyRef.current = [...historyRef.current, { role:"user", content:msg }];
    setLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key": API_KEY,
          "anthropic-version":"2023-06-01",
        },
        body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, system:SYSTEM_PROMPT, messages:historyRef.current })
      });
      const data = await res.json();
      if (data.content?.[0]?.text) {
        const reply = data.content[0].text;
        historyRef.current = [...historyRef.current, { role:"assistant", content:reply }];
        setMessages(p => [...p, { role:"baby", text:reply, time:getTime() }]);
        speak(reply);
      } else {
        setError(data.error?.message || "Kuch gadbad ho gayi 🌸 Dobara try karein!");
      }
    } catch(e) {
      setError("Connect nahi ho pa raha. Internet aur API key check karein 💫");
    }
    setLoading(false);
    inputRef.current?.focus();
  }

  async function send(text) { await sendText(text || input.trim()); }
  function handleKey(e) { if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); send(); } }

  // Colors
  const pink = "linear-gradient(135deg,#ff85c2,#c285ff)";

  return (
    <div style={{fontFamily:"'Nunito','Noto Sans Devanagari',sans-serif",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:12}}>

      {/* Blobs */}
      {[{w:300,h:300,bg:"#ffb3d9",top:"-80px",left:"-80px",op:.3},{w:260,h:260,bg:"#c9b3ff",bottom:"-60px",right:"-60px",op:.25},{w:180,h:180,bg:"#b3f0da",top:"40%",left:"-50px",op:.2}].map((b,i)=>(
        <div key={i} style={{position:"fixed",width:b.w,height:b.h,borderRadius:"50%",background:b.bg,filter:"blur(60px)",opacity:b.op,top:b.top,left:b.left,right:b.right,bottom:b.bottom,pointerEvents:"none",zIndex:0}}/>
      ))}

      <div style={{position:"relative",zIndex:10,width:"100%",maxWidth:500,height:"min(860px,96vh)",display:"flex",flexDirection:"column",background:"rgba(255,255,255,0.87)",backdropFilter:"blur(20px)",borderRadius:28,border:"2px solid rgba(255,133,194,0.25)",boxShadow:"0 20px 60px rgba(255,133,194,0.18)",overflow:"hidden"}}>

        {/* ── Header ── */}
        <div style={{padding:"16px 20px 12px",display:"flex",alignItems:"center",gap:12,borderBottom:"2px dashed rgba(255,133,194,0.2)",background:"rgba(255,255,255,0.7)",flexShrink:0}}>
          <div style={{width:52,height:52,borderRadius:18,background:pink,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,boxShadow:"0 4px 14px rgba(255,133,194,0.4)",flexShrink:0,position:"relative",animation:speaking?"speakPulse 0.8s ease-in-out infinite":"none"}}>
            🌸
            <div style={{position:"absolute",bottom:-2,right:-2,width:13,height:13,borderRadius:"50%",background:speaking?"#ff85c2":"#4ade80",border:"2.5px solid white",transition:"background 0.3s"}}/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:19,fontWeight:900,background:"linear-gradient(90deg,#ff85c2,#c285ff)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1.1}}>Anuj's Baby ✨</div>
            <div style={{fontSize:11,color:"#9b7aaa",fontWeight:700,marginTop:2}}>
              {speaking ? "🔊 Bol rahi hoon..." : listening ? "🎙️ Sun rahi hoon..." : "Anuj ji ka apna AI saathi 🇮🇳"}
            </div>
            <div style={{display:"flex",gap:5,marginTop:4,flexWrap:"wrap"}}>
              {[["💬 बातें","#ffe0f0","#d4589a"],["✍️ Writing","#ede0ff","#9a58d4"],["💡 Salah","#e0f8ee","#2da870"],["🎙️ Voice","#fff0e0","#e06020"]].map(([l,bg,c])=>(
                <span key={l} style={{background:bg,color:c,fontSize:9,fontWeight:800,padding:"2px 6px",borderRadius:20}}>{l}</span>
              ))}
            </div>
          </div>
          {/* Voice toggle */}
          <button onClick={()=>{setVoiceEnabled(v=>!v); stopSpeaking();}} title={voiceEnabled?"Voice band karo":"Voice chalu karo"}
            style={{width:36,height:36,borderRadius:12,background:voiceEnabled?"#fff0f8":"#f0f0f0",border:`2px solid ${voiceEnabled?"rgba(255,133,194,0.4)":"#ddd"}`,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.2s"}}>
            {voiceEnabled ? "🔊" : "🔇"}
          </button>
        </div>

        {/* ── Messages ── */}
        <div style={{flex:1,overflowY:"auto",padding:"18px 16px 10px",display:"flex",flexDirection:"column",gap:13}}>

          {/* Welcome */}
          <div style={{background:"linear-gradient(135deg,rgba(255,133,194,0.08),rgba(194,133,255,0.08))",border:"2px solid rgba(255,133,194,0.2)",borderRadius:22,padding:"18px 20px",textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:8}}>🌸</div>
            <div style={{fontSize:17,fontWeight:900,color:"#3d2040",marginBottom:6}}>Pranam Anuj ji! Main hoon aapki Baby! 🙏</div>
            <div style={{fontSize:13,color:"#9b7aaa",fontWeight:600,lineHeight:1.8}}>
              Hindi mein baat karein, English mein karein, ya dono mix karein — main hamesha taiyaar hoon! ✨<br/>
              Aur agar bolna chahein to 🎙️ mic ka button dabayein — main sunungi! 💬
            </div>
          </div>

          {/* Suggestions */}
          {showSugg && (
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <div style={{fontSize:10,fontWeight:800,color:"#9b7aaa",textTransform:"uppercase",letterSpacing:1,paddingLeft:4}}>✨ Kuch poochh ke dekhein…</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                {suggestions.map(s=>(
                  <button key={s.text} onClick={()=>send(s.text)}
                    onMouseEnter={e=>{e.currentTarget.style.background=pink;e.currentTarget.style.color="white";e.currentTarget.style.borderColor="transparent";e.currentTarget.style.transform="translateY(-2px)"}}
                    onMouseLeave={e=>{e.currentTarget.style.background="white";e.currentTarget.style.color="#3d2040";e.currentTarget.style.borderColor="rgba(255,133,194,0.3)";e.currentTarget.style.transform="none"}}
                    style={{background:"white",border:"2px solid rgba(255,133,194,0.3)",borderRadius:20,padding:"5px 11px",fontSize:11.5,fontWeight:700,color:"#3d2040",cursor:"pointer",fontFamily:"inherit",boxShadow:"0 2px 8px rgba(255,133,194,0.12)",transition:"all 0.15s"}}>
                    {s.emoji} {s.text}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Chat messages */}
          {messages.map((m,i)=>{
            const isUser = m.role==="user";
            return (
              <div key={i} style={{display:"flex",flexDirection:"column",alignItems:isUser?"flex-end":"flex-start",gap:3,animation:"fadeIn 0.3s ease"}}>
                <div style={{display:"flex",alignItems:"flex-end",gap:8,flexDirection:isUser?"row-reverse":"row"}}>
                  <div style={{width:30,height:30,borderRadius:12,background:isUser?"linear-gradient(135deg,#85d4ff,#85e8c2)":pink,display:"flex",alignItems:"center",justifyContent:"center",fontSize:isUser?12:14,fontWeight:800,color:"white",flexShrink:0,boxShadow:"0 2px 8px rgba(0,0,0,0.1)"}}>
                    {isUser?"A":"🌸"}
                  </div>
                  <div style={{maxWidth:310,padding:"11px 15px",borderRadius:22,borderBottomRightRadius:isUser?6:22,borderBottomLeftRadius:isUser?22:6,fontSize:13.5,fontWeight:600,lineHeight:1.75,wordBreak:"break-word",background:isUser?pink:"white",color:isUser?"white":"#3d2040",border:isUser?"none":"2px solid rgba(255,133,194,0.2)",boxShadow:isUser?"0 4px 16px rgba(255,133,194,0.3)":"0 4px 16px rgba(255,133,194,0.08)",whiteSpace:"pre-wrap"}}>
                    {m.text}
                  </div>
                  {/* Replay button for baby messages */}
                  {!isUser && voiceEnabled && (
                    <button onClick={()=>speak(m.text)} title="Phir se sunein"
                      style={{width:26,height:26,borderRadius:9,background:"#fff0f8",border:"1.5px solid rgba(255,133,194,0.3)",cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginBottom:2,opacity:0.8,transition:"opacity 0.15s"}}
                      onMouseEnter={e=>e.currentTarget.style.opacity=1}
                      onMouseLeave={e=>e.currentTarget.style.opacity=0.8}>
                      🔁
                    </button>
                  )}
                </div>
                <div style={{fontSize:10,color:"#9b7aaa",fontWeight:700,paddingLeft:isUser?0:38,paddingRight:isUser?38:0}}>{m.time}</div>
              </div>
            );
          })}

          {/* Typing indicator */}
          {loading && (
            <div style={{display:"flex",alignItems:"flex-end",gap:8,animation:"fadeIn 0.3s ease"}}>
              <div style={{width:30,height:30,borderRadius:12,background:pink,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>🌸</div>
              <div style={{background:"white",border:"2px solid rgba(255,133,194,0.2)",borderRadius:22,borderBottomLeftRadius:6,padding:"13px 17px",display:"flex",gap:5,alignItems:"center"}}>
                {[0,150,300].map((d,i)=>(
                  <div key={i} style={{width:7,height:7,borderRadius:"50%",background:pink,animation:`bounce 1.1s ${d}ms ease-in-out infinite`}}/>
                ))}
              </div>
            </div>
          )}

          {error && <div style={{background:"#fff0f5",border:"2px solid #ffb3d0",color:"#d4507a",borderRadius:18,padding:"10px 14px",fontSize:12.5,fontWeight:700,alignSelf:"flex-start",maxWidth:340}}>⚠️ {error}</div>}
          <div ref={endRef}/>
        </div>

        {/* ── Voice waveform bar (shows when listening) ── */}
        {listening && (
          <div style={{background:"rgba(255,240,248,0.95)",borderTop:"2px dashed rgba(255,133,194,0.2)",padding:"10px 20px",display:"flex",alignItems:"center",justifyContent:"center",gap:12,flexShrink:0}}>
            <span style={{fontSize:12,fontWeight:800,color:"#d4589a"}}>🎙️ Sun rahi hoon Anuj ji…</span>
            <div style={{display:"flex",gap:3,alignItems:"center",height:24}}>
              {[0,0.1,0.2,0.15,0.05,0.25,0.1,0.2].map((d,i)=>(
                <div key={i} style={{width:4,borderRadius:2,background:"linear-gradient(to top,#ff85c2,#c285ff)",height:"100%",animation:`wave 0.8s ${d}s ease-in-out infinite`}}/>
              ))}
            </div>
          </div>
        )}

        {/* ── Input area ── */}
        <div style={{padding:"10px 14px 14px",borderTop:"2px dashed rgba(255,133,194,0.2)",background:"rgba(255,255,255,0.7)",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"flex-end",gap:8,background:"white",border:"2.5px solid rgba(255,133,194,0.35)",borderRadius:22,padding:"8px 8px 8px 14px",boxShadow:"0 4px 16px rgba(255,133,194,0.12)"}}>

            <textarea ref={inputRef} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKey}
              placeholder="Hindi, English, Hinglish — kuch bhi likhein! 🌸" rows={1} disabled={loading||listening}
              style={{flex:1,border:"none",outline:"none",resize:"none",background:"none",fontFamily:"'Nunito','Noto Sans Devanagari',sans-serif",fontSize:13.5,fontWeight:600,color:"#3d2040",lineHeight:1.5,maxHeight:100,overflow:"auto"}}
              onInput={e=>{e.target.style.height="";e.target.style.height=Math.min(e.target.scrollHeight,100)+"px"}}
            />

            {/* Stop speaking button */}
            {speaking && (
              <button onClick={stopSpeaking} title="Bolna band karo"
                style={{width:38,height:38,borderRadius:13,background:"#fff0f8",border:"2px solid rgba(255,133,194,0.4)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0,animation:"speakPulse 0.8s ease-in-out infinite"}}>
                ⏹️
              </button>
            )}

            {/* Mic button */}
            {micSupport && (
              <button onClick={startListening} title={listening?"Rokein":"Voice se bolein"}
                style={{width:38,height:38,borderRadius:13,background:listening?"linear-gradient(135deg,#ff5585,#ff85c2)":"#fff0f8",border:`2px solid ${listening?"transparent":"rgba(255,133,194,0.4)"}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0,animation:listening?"micPulse 1.2s ease-in-out infinite":"none",transition:"all 0.2s"}}>
                {listening ? "⏹" : "🎙️"}
              </button>
            )}

            {/* Send button */}
            <button onClick={()=>send()} disabled={loading||!input.trim()||listening}
              style={{width:38,height:38,borderRadius:13,background:(loading||!input.trim()||listening)?"#f0d8e8":pink,border:"none",cursor:(loading||!input.trim()||listening)?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0,boxShadow:(loading||!input.trim()||listening)?"none":"0 3px 12px rgba(255,133,194,0.4)",transition:"all 0.15s"}}>
              🚀
            </button>
          </div>

          <div style={{textAlign:"center",fontSize:10.5,color:"#c4a0c4",fontWeight:700,marginTop:7}}>
            ⌨️ Enter dabayein bhejne ke liye &nbsp;·&nbsp; 🎙️ Mic dabayein bolne ke liye
          </div>
        </div>
      </div>

      <style>{`
        @keyframes speakPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
        @keyframes micPulse{0%{box-shadow:0 0 0 0 rgba(255,85,133,0.5)}70%{box-shadow:0 0 0 14px rgba(255,85,133,0)}100%{box-shadow:0 0 0 0 rgba(255,85,133,0)}}
        @keyframes wave{0%,100%{transform:scaleY(0.3)}50%{transform:scaleY(1)}}
      `}</style>
    </div>
  );
}

// Load voices before rendering (needed for some browsers)
window.speechSynthesis.onvoiceschanged = () => {};
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
